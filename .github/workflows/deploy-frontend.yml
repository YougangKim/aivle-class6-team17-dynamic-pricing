name: Deploy frontend to EC2

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-frontend-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}

    steps:
      - name: Checkout only frontend
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            frontend
          sparse-checkout-cone-mode: true
          fetch-depth: 1

      - name: Verify frontend files
        shell: bash
        run: |
          test -f frontend/package.json
          test -f frontend/package-lock.json
          test -f frontend/vite.config.js

          echo "Frontend files:"
          find frontend -maxdepth 2 -type f | sort | head -100

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.NODE_VERSION || '20' }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Validate frontend build
        shell: bash
        run: |
          test -d frontend/dist
          test -f frontend/dist/index.html

          echo "Build output:"
          find frontend/dist -maxdepth 2 -type f | sort

          echo "Build size:"
          du -sh frontend/dist

      - name: Package frontend dist only
        shell: bash
        run: |
          ARTIFACT_NAME="frontend-${GITHUB_SHA}.zip"

          cd frontend/dist
          zip -qr "${GITHUB_WORKSPACE}/${ARTIFACT_NAME}" .
          cd "${GITHUB_WORKSPACE}"

          test -s "${ARTIFACT_NAME}"

          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "${GITHUB_ENV}"

          echo "Artifact:"
          ls -lh "${ARTIFACT_NAME}"

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Upload frontend artifact to S3
        shell: bash
        run: |
          aws s3 cp \
            "${ARTIFACT_NAME}" \
            "s3://${S3_BUCKET}/releases/${ARTIFACT_NAME}" \
            --region "${AWS_REGION}"

      - name: Deploy frontend through SSM
        shell: bash
        run: |

          PARAMETERS="$(
            jq -n \
              --arg command "/usr/local/bin/deploy-aivle-web '${ARTIFACT_NAME}'" \
              '{commands: [$command]}'
          )"

          COMMAND_ID="$(
            aws ssm send-command \
              --instance-ids "${EC2_INSTANCE_ID}" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy frontend ${GITHUB_SHA}" \
              --parameters "${PARAMETERS}" \
              --query "Command.CommandId" \
              --output text \
              --region "${AWS_REGION}"
          )"

          echo "SSM Command ID: ${COMMAND_ID}"

          STATUS="Pending"

          for attempt in $(seq 1 60); do
            STATUS="$(
              aws ssm get-command-invocation \
                --command-id "${COMMAND_ID}" \
                --instance-id "${EC2_INSTANCE_ID}" \
                --query "Status" \
                --output text \
                --region "${AWS_REGION}" \
                2>/dev/null || echo "Pending"
            )"

            echo "SSM status: ${STATUS}"

            case "${STATUS}" in
              Success)
                break
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${EC2_INSTANCE_ID}" \
                  --region "${AWS_REGION}" || true
                exit 1
                ;;
            esac

            sleep 10
          done

          if [[ "${STATUS}" != "Success" ]]; then
            echo "SSM 배포가 제한 시간 안에 완료되지 않았습니다."
            exit 1
          fi

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --region "${AWS_REGION}"

      - name: Invalidate CloudFront cache
        shell: bash
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
